name: CI
on:
  push:
    branches: [dev, 'feat/**']
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint || true  # Don't fail on lint warnings for now

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for leaked secrets
        run: |
          # Check for IP addresses that look like internal infrastructure
          if grep -rn '100\.\(88\|120\)\.' --include='*.ts' --include='*.tsx' --include='*.astro' --include='*.toml' --include='*.json' --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "::error::Found potential internal IP addresses in source files"
            exit 1
          fi
          # Check for common secret patterns
          if grep -rn 'password\s*=\s*["\x27][^"\x27]*["\x27]' --include='*.ts' --include='*.toml' --exclude-dir=node_modules --exclude-dir=.git .; then
            echo "::warning::Found potential hardcoded passwords"
          fi
