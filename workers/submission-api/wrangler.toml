name = "oms-submission-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
GITHUB_OWNER = "gitjfmd"
GITHUB_REPO = "open-medical-skills"
ALLOWED_ORIGIN = "https://oms.jfmd.win"

# Secrets (set via wrangler secret put):
# GITHUB_TOKEN - fine-grained PAT with contents:write and pull_requests:write
# GITHUB_CLIENT_ID - OAuth App client ID (for user authentication)
# GITHUB_CLIENT_SECRET - OAuth App client secret (for token exchange)
