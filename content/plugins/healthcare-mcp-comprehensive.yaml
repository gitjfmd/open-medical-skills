name: "healthcare-mcp-comprehensive"
display_name: "Healthcare MCP Comprehensive Suite"
description: "Comprehensive MCP plugin providing AI assistants with access to FDA drug info, PubMed, medRxiv, NCBI Bookshelf, clinical trials, ICD-10, DICOM metadata, and medical calculators. 9 integrated tools with efficient caching and connection pooling."
author: "Cicatriiz (Forrest B)"
repository: "https://github.com/gitjfmd/open-medical-skills"
category: "diagnosis"
tags: ["mcp-plugin", "fda", "pubmed", "clinical-trials", "icd-10", "dicom", "comprehensive"]
version: "1.0.0"
license: "MIT"
type: "plugin"
install:
  npx: "npx healthcare-mcp-public"
  git: "git clone https://github.com/gitjfmd/open-medical-skills.git ~/.claude/plugins/healthcare-mcp-comprehensive"
evidence_level: "high"
safety_classification: "safe"
specialty: ["multi-specialty"]
tools:
  - "FDA Drug Information with response parsing"
  - "PubMed Research (medical literature search)"
  - "Health Topics (Health.gov integration)"
  - "Clinical Trials (ongoing and completed)"
  - "Medical Terminology (ICD-10 code lookups)"
  - "medRxiv Search (pre-print articles)"
  - "Medical Calculator (BMI, etc.)"
  - "NCBI Bookshelf Search"
  - "DICOM Metadata Extraction"
reviewer: "Pending Review"
date_added: "2026-03-02"
verified: false
plugin_type: "mcp-server"
