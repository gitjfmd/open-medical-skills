name: "medikode-medical-coding-platform"
display_name: "Medikode AI Medical Coding Platform"
description: "AI-driven medical coding platform for CPT/ICD-10 validation, quality assurance, EOB parsing, and RAF score calculation. Five integrated tools providing code validation against clinical documentation, coding QA with gap identification, structured EOB data extraction, RAF/HCC scoring, and composite workflow validation. Requires API key from Medikode."
author: "OMS Contributors"
repository: "https://github.com/gitjfmd/oms-site/tree/main/plugins/medikode-medical-coding-platform"
category: "administrative"
tags: ["mcp-plugin", "medical-coding", "cpt", "icd-10", "raf-score", "hcc", "billing"]
version: "1.0.0"
license: "Commercial"
type: "plugin"
install:
  npx: "npx @medikode/mcp-server"
  git: "git clone https://github.com/gitjfmd/oms-site.git && cp -r oms-site/plugins/medikode-medical-coding-platform ~/.claude/plugins/"
evidence_level: "moderate"
safety_classification: "safe"
specialty: ["medical-coding", "health-information-management", "revenue-cycle"]
tools:
  - "Code Validation (CPT/ICD-10 against documentation)"
  - "Quality Assurance (coding QA, gap identification)"
  - "EOB Parsing (Explanation of Benefits structured data)"
  - "RAF Score Calculation (HCC capture from encounters)"
  - "Composite Workflow (validates chart coding + RAF in one step)"
reviewer: "Pending Review"
