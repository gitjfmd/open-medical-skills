name: "holy-bio-research-suite"
display_name: "Holy Bio Bioinformatics Research Suite"
description: "Unified framework of 50+ specialized bioinformatics MCP functions for biomedical research. Includes pharmacology (Guide to PHARMACOLOGY), aging/longevity research (opengenes), gene/variant/chemical data (biothings), genomics toolkit (gget), and genetic interactions (synergy-age). Single unified configuration enables all servers at once."
author: "longevity-genie"
repository: "https://github.com/gitjfmd/open-medical-skills"
category: "research"
tags: ["mcp-plugin", "bioinformatics", "genomics", "pharmacology", "longevity", "research-suite"]
version: "1.0.0"
license: "MIT"
type: "plugin"
install:
  git: "git clone https://github.com/gitjfmd/open-medical-skills.git ~/.claude/plugins/holy-bio-research-suite"
evidence_level: "high"
safety_classification: "safe"
specialty: ["bioinformatics", "genomics", "pharmacology"]
tools:
  - "pharmacology-mcp (Guide to PHARMACOLOGY)"
  - "opengenes-mcp (aging/longevity research)"
  - "biothings-mcp (gene, variant, chemical, taxonomic data)"
  - "gget-mcp (bioinformatics toolkit for genomics queries)"
  - "synergy-age-mcp (genetic interactions in longevity)"
reviewer: "Pending Review"
date_added: "2026-03-02"
verified: false
plugin_type: "mcp-server-suite"
